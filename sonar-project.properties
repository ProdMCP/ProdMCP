# Must be unique in a given SonarCloud organization
sonar.projectKey=ProdMCP-org_ProdMCP
sonar.organization=prodmcp-org

# --- optional properties ---
sonar.projectName=ProdMCP
sonar.projectVersion=0.3.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src/prodmcp
sonar.tests=tests

# Code coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclude specific logic
sonar.exclusions=tests/**, examples/**, docs/**, build/**, dist/**, .venv/**
